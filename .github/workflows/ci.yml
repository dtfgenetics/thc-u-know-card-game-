name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm -r lint

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter @thc-u-know/web exec playwright install --with-deps chromium

      - name: Multiplayer end-to-end test
        run: pnpm --filter @thc-u-know/web test:e2e
