services:
  redis:
    image: redis:7-alpine
    container_name: thc-u-know-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - thc-u-know-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  thc-u-know-redis-data:
